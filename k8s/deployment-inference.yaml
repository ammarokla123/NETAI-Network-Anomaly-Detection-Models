apiVersion: apps/v1
kind: Deployment
metadata:
  name: netai-inference
  namespace: netai
  labels:
    app.kubernetes.io/name: netai-anomaly
    app.kubernetes.io/component: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netai-inference
  template:
    metadata:
      labels:
        app: netai-inference
    spec:
      containers:
        - name: inference
          image: netai-anomaly:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          args:
            - "--checkpoint"
            - "/models/model_best.pt"
            - "--device"
            - "cpu"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
            - name: config-volume
              mountPath: /app/configs
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: netai-models-pvc
        - name: config-volume
          configMap:
            name: netai-config
