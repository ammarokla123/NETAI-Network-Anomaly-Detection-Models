# Transformer model configuration
model:
  name: "transformer"
  input_dim: null             # set dynamically from feature count
  d_model: 64
  nhead: 4
  num_encoder_layers: 3
  dim_feedforward: 128
  dropout: 0.1
  max_seq_len: 60
  use_positional_encoding: true
  output_dim: null            # set dynamically (reconstruction)

training:
  epochs: 50
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.0001
  loss: "mse"
  warmup_steps: 200
