# Default configuration for NETAI Anomaly Detection
data:
  db_path: "data/network_telemetry.db"
  sequence_length: 60        # 60 time-steps per window
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  anomaly_ratio: 0.05        # 5% anomalies in synthetic data
  num_samples: 50000
  features:
    - throughput_mbps
    - latency_ms
    - packet_loss_pct
    - retransmits
    - jitter_ms

feature_engineering:
  rolling_windows: [5, 15, 30]
  lag_steps: [1, 3, 5, 10]
  normalize: true
  scaler: "standard"          # standard | minmax | robust

training:
  seed: 42
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 10                # early stopping patience
  scheduler: "cosine"         # cosine | step | plateau
  gradient_clip: 1.0
  device: "auto"              # auto | cpu | cuda
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

evaluation:
  threshold_percentile: 95    # reconstruction error percentile for anomaly threshold
  metrics:
    - precision
    - recall
    - f1_score
    - roc_auc
    - pr_auc
