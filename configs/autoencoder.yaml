# Autoencoder model configuration
model:
  name: "autoencoder"
  input_dim: null             # set dynamically from feature count
  encoder_dims: [64, 32, 16]
  latent_dim: 8
  decoder_dims: [16, 32, 64]
  dropout: 0.2
  activation: "relu"
  use_batch_norm: true

training:
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: "mse"
